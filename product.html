<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product — Krystal's Art Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Imbue:opsz,wght@10..100,300;10..100,400;10..100,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html"><span>Krystal's</span> Art Shop</a>
  <nav class="site-nav">
    <a class="nav-link" href="shop.html">Shop</a>
    <a class="nav-link" href="index.html#contact">Contact</a>
  </nav>
  <button class="cart-btn" onclick="openCart()">
    Cart <span class="badge" id="badge"></span>
  </button>
  <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
</header>

<main class="shop">
  <div id="product-breadcrumb" class="coll-breadcrumb"
       style="font-size:.82rem;color:var(--muted);margin-bottom:28px"></div>
  <div id="product-body"></div>
</main>

<footer>
  <div class="f-logo"><span>Krystal's</span> Art Shop</div>
  <div class="f-copy">&copy; 2025 Krystal's Art Shop &middot; Fulfilled by Printful</div>
</footer>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div id="drawer" role="dialog" aria-modal="true" aria-label="Shopping cart">
  <div class="d-head">
    <span class="d-title">Your Cart</span>
    <button class="d-close" onclick="closeCart()" aria-label="Close cart">&#10005;</button>
  </div>
  <div class="d-body" id="d-body"></div>
  <div class="d-foot" id="d-foot" style="display:none"></div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<script src="main.js"></script>
</body>
</html>
